<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#fbfaf7">
<title>Livre d'accueil</title>
<style>
  :root{
    --bg:#fbfaf7;
    --card:#ffffff;
    --ink:#232323;
    --muted:#6b6b66;
    --accent:#1f6f5c;
    --accent-soft:#e7f2ef;
    --line:#e7e4dc;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;padding:28px 20px 60px;}
  .hero{margin-bottom:28px;}
  .eyebrow{
    text-transform:uppercase;
    letter-spacing:.12em;
    font-size:12px;
    color:var(--accent);
    font-weight:700;
    margin:0 0 6px;
  }
  h1{font-size:28px;margin:0 0 6px;letter-spacing:-.01em;}
  .sub{color:var(--muted);margin:0;font-size:15px;}

  nav.jump{
    display:flex;gap:10px;overflow-x:auto;
    margin:22px 0 26px;padding-bottom:4px;
    -webkit-overflow-scrolling:touch;
  }
  nav.jump a{
    flex:0 0 auto;
    display:flex;flex-direction:column;gap:2px;
    text-decoration:none;color:var(--ink);
    background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:10px 14px;font-size:13px;
  }
  nav.jump a b{font-size:16px;}
  nav.jump a span{color:var(--muted);font-size:11px;}

  section{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px;
    margin-bottom:16px;
    scroll-margin-top:16px;
  }
  section h2{
    margin:0 0 12px;
    font-size:17px;
    display:flex;align-items:center;gap:8px;
  }
  .kv{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--line);}
  .kv:first-of-type{border-top:none;}
  .kv .label{color:var(--muted);font-size:13px;}
  .kv .value{font-weight:600;font-size:15px;}

  .wifi-row{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--accent-soft);border-radius:12px;padding:12px 14px;margin-top:8px;
  }
  .wifi-row .value{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:16px;}
  button.copy{
    border:none;background:var(--accent);color:#fff;
    padding:8px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;
  }
  button.copy:active{opacity:.8;}

  .code-badge{
    display:inline-block;margin-top:10px;
    background:var(--accent-soft);color:var(--accent);
    font-weight:700;font-family:ui-monospace,monospace;font-size:18px;
    padding:6px 14px;border-radius:10px;letter-spacing:.05em;
  }

  .item{padding:12px 0;border-top:1px solid var(--line);}
  .item:first-child{border-top:none;padding-top:0;}
  .item .title{font-weight:600;margin-bottom:3px;display:flex;gap:8px;align-items:center;}
  .item .text{color:var(--muted);font-size:14px;}

  a.mapslink{
    display:inline-block;margin-top:10px;font-size:13px;font-weight:600;
    color:var(--accent);text-decoration:none;border-bottom:1px solid var(--accent);
  }

  .rules{font-size:14px;color:var(--muted);}

  footer{text-align:center;margin-top:32px;color:var(--muted);font-size:13px;}
  .loading, .error{padding:40px 20px;text-align:center;color:var(--muted);}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">Chargement du livret d'accueil…</div>
</div>

<script>
async function init(){
  const params = new URLSearchParams(location.search);
  const id = params.get('id') || 'appartement-test';
  const app = document.getElementById('app');

  let data;
  try{
    const res = await fetch(`data/${id}.json`, {cache:'no-store'});
    if(!res.ok) throw new Error('not found');
    data = await res.json();
  }catch(e){
    app.innerHTML = `<div class="error">Livret introuvable pour « ${id} ». Vérifiez le lien.</div>`;
    return;
  }

  const equipements = (data.equipements||[]).map(eq => `
    <div class="item">
      <div class="title">${eq.icone||''} ${eq.titre}</div>
      <div class="text">${eq.texte}</div>
    </div>`).join('');

  const adresses = (data.adresses||[]).map(a => `
    <div class="item">
      <div class="title">${a.nom}</div>
      <div class="text">${a.info}</div>
    </div>`).join('');

  app.innerHTML = `
    <div class="hero">
      <p class="eyebrow">Livre d'accueil</p>
      <h1>Bienvenue${data.nom ? ' — ' + data.nom : ''}</h1>
      <p class="sub">Tout ce qu'il faut pour profiter du séjour.</p>
    </div>

    <nav class="jump">
      <a href="#arrivee"><b>🔑</b><span>Arrivée</span></a>
      <a href="#parking"><b>🚗</b><span>Parking</span></a>
      <a href="#equipements"><b>🏠</b><span>Équipements</span></a>
      <a href="#adresses"><b>🍽️</b><span>Adresses</span></a>
    </nav>

    <section id="wifi">
      <h2>📶 Wi-Fi</h2>
      <div class="kv"><span class="label">Réseau</span><span class="value">${data.wifi?.reseau||''}</span></div>
      <div class="wifi-row">
        <span class="value" id="wifi-pass">${data.wifi?.motDePasse||''}</span>
        <button class="copy" id="copy-btn">Copier</button>
      </div>
    </section>

    <section id="arrivee">
      <h2>🔑 Arrivée et départ</h2>
      <div class="kv"><span class="label">Arrivée</span><span class="value">${data.arrivee?.horaireArrivee||''}</span></div>
      <div class="kv"><span class="label">Départ</span><span class="value">${data.arrivee?.horaireDepart||''}</span></div>
      <p class="rules" style="margin-top:10px">${data.arrivee?.instructions||''}</p>
      ${data.arrivee?.codeBoite ? `<div class="code-badge">Code : ${data.arrivee.codeBoite}</div>` : ''}
    </section>

    <section id="parking">
      <h2>🚗 Parking</h2>
      <p class="rules">${data.parking?.description||''}</p>
      ${data.parking?.lienMaps ? `<a class="mapslink" href="${data.parking.lienMaps}" target="_blank" rel="noopener">Ouvrir dans Google Maps →</a>` : ''}
    </section>

    <section id="equipements">
      <h2>🏠 Équipements</h2>
      ${equipements || '<p class="rules">Aucune information pour le moment.</p>'}
    </section>

    <section id="adresses">
      <h2>🍽️ Bonnes adresses</h2>
      ${adresses || '<p class="rules">Aucune information pour le moment.</p>'}
    </section>

    <section>
      <h2>📌 Règles essentielles</h2>
      <p class="rules">${data.reglement||''}</p>
    </section>

    <section>
      <h2>Besoin d'aide ?</h2>
      <p class="rules">${data.contactHote||''}</p>
    </section>

    <footer>Merci et excellent séjour ☀️</footer>
  `;

  document.getElementById('copy-btn')?.addEventListener('click', () => {
    const pass = data.wifi?.motDePasse || '';
    navigator.clipboard.writeText(pass).then(() => {
      const btn = document.getElementById('copy-btn');
      const original = btn.textContent;
      btn.textContent = 'Copié ✓';
      setTimeout(() => btn.textContent = original, 1500);
    });
  });
}
init();
</script>
</body>
</html>
